<!DOCTYPE html>
<html lang="ko">
<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Gamja+Flower&family=Jua&display=swap" rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>5-1 website!</title>
</head>
<body>
    <script src="script.js"></script>
    <div id="container">
        <header>
            <div id="logo">
                <a href="index.html"><img src="image/5학년 1반 로고.png" alt="logo" width="45"></a>
            </div>
            <nav>
                <ul>
                    <li><a href="#padlet">padlet</a></li>
                    <li><a href="#classroom">알림장</a></li>
                    <li><a href="#friend">친구들이 좋아하는 사이트</a></li>
                    <li><a href="#teacher">수업시간에 사용하는 사이트</a></li>
                    <li><a href="#timetable">시간표</a></li>
                </ul>
            </nav>
        </header>
        <div id="slideShow"></div>
        <div class="contents">
            <div id="main">
                <section id="padlet">
                    <h1><a href="https://padlet.com/dongbuk18/5-1-ml7gaka49amkzcoj" target="_blank">padlet 바로가기</a></h1>
                    <h1><img src="image/padlet.png" alt="padlet이미지" width="50%"></h1>
                </section>
                <section id="classroom">
                    <h1><a target="_blank" href="https://classroom.google.com/c/NjY0MDgyODI5MDcy">classroom 바로가기</a></h1>
                    <h1><img src="image/classroom.png" alt="classroom이미지" width="50%"></h1>
                </section>
                <section id="friend">
                    <h1>설문조사</h1>
                    <form id="siteForm">
                        <label for="question1">좋아하는 사이트 이름을 적어주세요!:</label>
                        <input type="text" id="question1" name="question1" required><br><br>
                        <label for="question2">좋아하는 사이트 주소를 적어주세요!:</label>
                        <input type="url" id="question2" name="question2" required><br><br>
                        <input type="submit" value="제출">
                    </form>
                    <div id="output"></div>
                </section>
                <section id="teacher">
                    <h1>수업시간에 사용하는 사이트</h1>
                    <ul id="teacherSites"></ul>
                    <button id="addSiteButton">사이트 추가</button>
                    <div id="popup" class="popup">
                        <form id="popupForm">
                            <label for="siteName">사이트 이름:</label>
                            <input type="text" id="siteName" name="siteName" required>
                            <label for="siteUrl">사이트 주소:</label>
                            <input type="url" id="siteUrl" name="siteUrl" required>
                            <button type="submit">저장</button>
                            <button type="button" id="closePopup">취소</button>
                        </form>
                    </div>
                    
                    <div id="loginPopup" class="popup">
                        <form id="loginForm">
                            <label for="username">사용자 이름:</label>
                            <input type="text" id="username" name="username" required>
                            <label for="password">비밀번호:</label>
                            <input type="password" id="password" name="password" required>
                            <button type="submit">로그인</button>
                            <button type="button" id="closeLoginPopup">취소</button>
                        </form>
                    </div>
                </section>
                <section id="timetable">
                    <h1>시간표</h1>
                    <table id="timetableTable">
                        <thead>
                            <tr>
                                <th>시간</th>
                                <th>월요일</th>
                                <th>화요일</th>
                                <th>수요일</th>
                                <th>목요일</th>
                                <th>금요일</th>
                            </tr>
                        </thead>
                        <tbody>
                            <!-- 시간표 데이터가 여기에 삽입됩니다. -->
                        </tbody>
                    </table>
                    <button id="editTimetableButton">시간표 수정</button>
                    <div id="timetablePopup" class="popup">
                        <form id="timetableForm">
                            <label for="time">시간:</label>
                            <input type="text" id="time" name="time" required>
                            <label for="monday">월요일:</label>
                            <input type="text" id="monday" name="monday">
                            <label for="tuesday">화요일:</label>
                            <input type="text" id="tuesday" name="tuesday">
                            <label for="wednesday">수요일:</label>
                            <input type="text" id="wednesday" name="wednesday">
                            <label for="thursday">목요일:</label>
                            <input type="text" id="thursday" name="thursday">
                            <label for="friday">금요일:</label>
                            <input type="text" id="friday" name="friday">
                            <button type="submit">저장</button>
                            <button type="button" id="closeTimetablePopup">취소</button>
                        </form>
                    </div>
                </section>
            </div>
        </div>
        <footer></footer>
    </div>
</body>
</html>
